name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_SECRET }}
          user: jimmyflatting
          filename: github-metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata

          # Include private contributions in the counts
          base_indepth: yes
